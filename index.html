<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Mais! 🎂</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(160deg, #fdf2f8 0%, #fce7f3 40%, #ede9fe 100%);
    font-family: 'Georgia', serif;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-12px); }
  }
  @keyframes pop {
    0% { transform: scale(0); opacity: 0; }
    70% { transform: scale(1.2); }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes confetti-fall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(620px) rotate(720deg); opacity: 0; }
  }
  @keyframes bounce-in {
    0% { transform: scale(0.3) translateY(-30px); opacity: 0; }
    60% { transform: scale(1.1) translateY(0); }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes heart-beat {
    0%, 100% { transform: scale(1); }
    25% { transform: scale(1.15); }
    50% { transform: scale(1); }
    75% { transform: scale(1.1); }
  }
  @keyframes star-twinkle {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.3; transform: scale(0.6); }
  }
  @keyframes name-glow {
    0%, 100% { text-shadow: 0 0 20px #f9a8d4, 0 0 40px #f472b6; }
    50% { text-shadow: 0 0 30px #c084fc, 0 0 60px #a855f7; }
  }
  @keyframes note-float {
    0% { transform: translateY(0) rotate(-10deg); opacity: 1; }
    100% { transform: translateY(-70px) rotate(10deg); opacity: 0; }
  }

  .scene {
    width: 100%;
    max-width: 480px;
    min-height: 600px;
    background: linear-gradient(160deg, #fdf2f8 0%, #fce7f3 40%, #ede9fe 100%);
    border-radius: 24px;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 36px 24px 40px;
    box-shadow: 0 20px 60px rgba(236, 72, 153, 0.2);
  }

  .confetti-piece {
    position: absolute;
    width: 10px;
    height: 10px;
    border-radius: 2px;
    animation: confetti-fall linear infinite;
    pointer-events: none;
  }

  .stars-row {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
  }
  .star {
    font-size: 18px;
    display: inline-block;
    animation: star-twinkle 1.5s ease-in-out infinite;
  }

  .cake-wrapper {
    animation: float 3s ease-in-out infinite;
    margin: 10px 0 20px;
  }
  .cake-svg { width: 160px; height: 160px; }

  .happy-text {
    font-size: 32px;
    font-weight: bold;
    background: linear-gradient(135deg, #ec4899, #a855f7, #6366f1);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-align: center;
    animation: bounce-in 0.8s ease-out both;
    letter-spacing: 2px;
    line-height: 1.2;
    margin-bottom: 6px;
  }
  .birthday-text {
    font-size: 36px;
    font-weight: bold;
    background: linear-gradient(135deg, #f472b6, #c084fc, #818cf8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-align: center;
    animation: bounce-in 0.9s ease-out both;
    letter-spacing: 3px;
    margin-bottom: 12px;
  }

  .name-tag {
    font-size: 42px;
    font-weight: bold;
    color: #be185d;
    animation: name-glow 2.5s ease-in-out infinite, bounce-in 1s ease-out both;
    text-align: center;
    margin-bottom: 6px;
  }

  .age-badge {
    background: linear-gradient(135deg, #f9a8d4, #c084fc);
    color: white;
    font-size: 15px;
    font-weight: bold;
    padding: 6px 20px;
    border-radius: 30px;
    margin-bottom: 22px;
    letter-spacing: 1px;
    animation: pop 0.8s ease-out 0.5s both;
    font-family: sans-serif;
  }

  .hearts-row {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
  }
  .heart {
    font-size: 22px;
    animation: heart-beat 1.2s ease-in-out infinite;
  }
  .heart:nth-child(2) { animation-delay: 0.2s; }
  .heart:nth-child(3) { animation-delay: 0.4s; }
  .heart:nth-child(4) { animation-delay: 0.6s; }
  .heart:nth-child(5) { animation-delay: 0.8s; }

  .music-player {
    background: white;
    border-radius: 20px;
    padding: 18px 22px;
    width: 100%;
    max-width: 340px;
    box-shadow: 0 4px 24px rgba(236, 72, 153, 0.15);
    border: 1.5px solid #fbcfe8;
    animation: pop 0.8s ease-out 0.8s both;
  }
  .player-title {
    font-size: 13px;
    color: #9ca3af;
    font-family: sans-serif;
    text-align: center;
    margin-bottom: 4px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .song-name {
    font-size: 16px;
    font-weight: bold;
    color: #be185d;
    text-align: center;
    font-family: sans-serif;
    margin-bottom: 16px;
  }
  .progress-bar-bg {
    background: #fce7f3;
    border-radius: 10px;
    height: 6px;
    width: 100%;
    margin-bottom: 14px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #ec4899, #a855f7);
    border-radius: 10px;
    width: 0%;
    transition: width 0.1s linear;
  }
  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }
  .play-btn {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: linear-gradient(135deg, #ec4899, #a855f7);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    color: white;
    transition: transform 0.1s;
    box-shadow: 0 2px 12px rgba(168, 85, 247, 0.3);
  }
  .play-btn:hover { transform: scale(1.08); }
  .play-btn:active { transform: scale(0.96); }
  .time-display {
    font-size: 12px;
    color: #9ca3af;
    font-family: monospace;
  }
  .note {
    position: absolute;
    font-size: 20px;
    animation: note-float 2s ease-out forwards;
    pointer-events: none;
  }
  .balloons {
    display: flex;
    gap: 16px;
    margin-bottom: 18px;
    animation: pop 0.8s ease-out 0.3s both;
  }
  .balloon {
    font-size: 38px;
    display: inline-block;
    animation: float 2.5s ease-in-out infinite;
  }
  .balloon:nth-child(1) { animation-delay: 0s; }
  .balloon:nth-child(2) { animation-delay: 0.4s; }
  .balloon:nth-child(3) { animation-delay: 0.8s; }
</style>
</head>
<body>

<div class="scene" id="scene">

  <!-- Confetti -->
  <div class="confetti-piece" style="left:5%; background:#f9a8d4; animation-duration:3.1s; animation-delay:0s; width:8px; height:12px;"></div>
  <div class="confetti-piece" style="left:12%; background:#c084fc; animation-duration:2.7s; animation-delay:0.5s; border-radius:50%;"></div>
  <div class="confetti-piece" style="left:22%; background:#fbbf24; animation-duration:3.5s; animation-delay:1s; width:6px; height:14px;"></div>
  <div class="confetti-piece" style="left:35%; background:#6ee7b7; animation-duration:2.9s; animation-delay:0.3s;"></div>
  <div class="confetti-piece" style="left:48%; background:#f9a8d4; animation-duration:3.2s; animation-delay:1.4s; border-radius:50%;"></div>
  <div class="confetti-piece" style="left:60%; background:#a5b4fc; animation-duration:2.6s; animation-delay:0.7s;"></div>
  <div class="confetti-piece" style="left:72%; background:#fca5a5; animation-duration:3.4s; animation-delay:0.2s; width:12px; height:8px;"></div>
  <div class="confetti-piece" style="left:83%; background:#c084fc; animation-duration:2.8s; animation-delay:1.1s;"></div>
  <div class="confetti-piece" style="left:91%; background:#fbbf24; animation-duration:3.0s; animation-delay:0.9s; border-radius:50%;"></div>
  <div class="confetti-piece" style="left:28%; background:#f472b6; animation-duration:3.6s; animation-delay:1.7s; width:7px; height:11px;"></div>
  <div class="confetti-piece" style="left:55%; background:#86efac; animation-duration:2.5s; animation-delay:2.1s; border-radius:50%; width:8px; height:8px;"></div>
  <div class="confetti-piece" style="left:78%; background:#fde68a; animation-duration:3.3s; animation-delay:0.6s; width:11px; height:7px;"></div>

  <div class="stars-row">
    <span class="star" style="animation-delay:0s">✦</span>
    <span class="star" style="animation-delay:0.3s">✧</span>
    <span class="star" style="animation-delay:0.6s">✦</span>
    <span class="star" style="animation-delay:0.9s">✧</span>
    <span class="star" style="animation-delay:1.2s">✦</span>
  </div>

  <!-- Cake SVG -->
  <div class="cake-wrapper">
    <svg class="cake-svg" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="80" cy="128" rx="60" ry="12" fill="#fce7f3" opacity="0.5"/>
      <rect x="28" y="95" width="104" height="32" rx="8" fill="#f9a8d4"/>
      <rect x="20" y="70" width="120" height="32" rx="8" fill="#f472b6"/>
      <rect x="28" y="48" width="104" height="28" rx="8" fill="#ec4899"/>
      <rect x="28" y="93" width="104" height="5" rx="2" fill="#fbcfe8"/>
      <rect x="20" y="68" width="120" height="5" rx="2" fill="#f9a8d4"/>
      <ellipse cx="80" cy="48" rx="52" ry="7" fill="#fde8f4"/>
      <circle cx="50" cy="48" r="5" fill="#fde8f4"/>
      <circle cx="65" cy="48" r="5" fill="#fde8f4"/>
      <circle cx="80" cy="48" r="5" fill="#fde8f4"/>
      <circle cx="95" cy="48" r="5" fill="#fde8f4"/>
      <circle cx="110" cy="48" r="5" fill="#fde8f4"/>
      <rect x="48" y="26" width="4" height="22" rx="2" fill="#fbbf24"/>
      <rect x="63" y="20" width="4" height="28" rx="2" fill="#fbbf24"/>
      <rect x="78" y="24" width="4" height="24" rx="2" fill="#fbbf24"/>
      <rect x="93" y="18" width="4" height="30" rx="2" fill="#fbbf24"/>
      <rect x="108" y="23" width="4" height="25" rx="2" fill="#fbbf24"/>
      <ellipse cx="50" cy="24" rx="5" ry="7" fill="#f97316" opacity="0.9"/>
      <ellipse cx="65" cy="18" rx="5" ry="7" fill="#eab308" opacity="0.9"/>
      <ellipse cx="80" cy="22" rx="5" ry="7" fill="#ef4444" opacity="0.9"/>
      <ellipse cx="95" cy="16" rx="5" ry="7" fill="#f97316" opacity="0.9"/>
      <ellipse cx="110" cy="21" rx="5" ry="7" fill="#eab308" opacity="0.9"/>
      <ellipse cx="50" cy="21" rx="2" ry="3" fill="white" opacity="0.6"/>
      <ellipse cx="65" cy="15" rx="2" ry="3" fill="white" opacity="0.6"/>
      <ellipse cx="80" cy="19" rx="2" ry="3" fill="white" opacity="0.6"/>
      <ellipse cx="95" cy="13" rx="2" ry="3" fill="white" opacity="0.6"/>
      <ellipse cx="110" cy="18" rx="2" ry="3" fill="white" opacity="0.6"/>
      <circle cx="40" cy="80" r="4" fill="#fde8f4" opacity="0.7"/>
      <circle cx="120" cy="85" r="3" fill="#fde8f4" opacity="0.7"/>
      <circle cx="60" cy="105" r="5" fill="#fde8f4" opacity="0.6"/>
      <circle cx="100" cy="100" r="4" fill="#fde8f4" opacity="0.6"/>
    </svg>
  </div>

  <div class="happy-text">Happy</div>
  <div class="birthday-text">Birthday!</div>
  <div class="name-tag">Mais 🌸</div>
  <div class="age-badge">✨ 16 years old ✨</div>

  <div class="balloons">
    <span class="balloon">🎈</span>
    <span class="balloon">🎀</span>
    <span class="balloon">🎈</span>
  </div>

  <div class="hearts-row">
    <span class="heart">💖</span>
    <span class="heart">💜</span>
    <span class="heart">💗</span>
    <span class="heart">💜</span>
    <span class="heart">💖</span>
  </div>

  <!-- Music Player -->
  <div class="music-player">
    <div class="player-title">🎵 now playing</div>
    <div class="song-name">Happy Birthday to You 🎂</div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progress"></div>
    </div>
    <div class="controls">
      <span class="time-display" id="time-display">0:00</span>
      <button class="play-btn" id="playBtn" onclick="togglePlay()">▶</button>
      <span class="time-display">0:30</span>
    </div>
  </div>

</div>

<script>
(function() {
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  let ctx = null, isPlaying = false, startTime = 0, elapsed = 0, pausedAt = 0;
  let sources = [], gainNode = null;
  const totalDuration = 30;

  const notes = {
    G4:392.00, A4:440.00, B4:493.88,
    C5:523.25, D5:587.33, E5:659.25,
    F5:698.46, G5:783.99
  };

  const song = [
    ['G4',0.5],['G4',0.5],['A4',1],['G4',1],['C5',1],['B4',2],
    ['G4',0.5],['G4',0.5],['A4',1],['G4',1],['D5',1],['C5',2],
    ['G4',0.5],['G4',0.5],['G5',1],['E5',1],['C5',0.75],['B4',0.75],['A4',1.5],
    ['F5',0.5],['F5',0.5],['E5',1],['C5',1],['D5',1],['C5',2]
  ];

  function playNote(freq, start, dur) {
    const osc = ctx.createOscillator();
    const env = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    env.gain.setValueAtTime(0, ctx.currentTime + start);
    env.gain.linearRampToValueAtTime(0.3, ctx.currentTime + start + 0.05);
    env.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + start + dur - 0.05);
    osc.connect(env);
    env.connect(gainNode);
    osc.start(ctx.currentTime + start);
    osc.stop(ctx.currentTime + start + dur);
    sources.push(osc);
  }

  function scheduleAll(offset) {
    let t = 0;
    for (let i = 0; i < song.length; i++) {
      const [n, d] = song[i];
      if (t + d > offset) {
        playNote(notes[n], Math.max(0, t - offset), d * 0.92);
      }
      t += d;
    }
  }

  function stopAll() {
    sources.forEach(s => { try { s.stop(); } catch(e){} });
    sources = [];
  }

  let animFrame;

  function updateUI() {
    const el = Math.min(elapsed + (isPlaying ? (ctx.currentTime - startTime) : 0), totalDuration);
    document.getElementById('progress').style.width = ((el / totalDuration) * 100) + '%';
    const s = Math.floor(el);
    document.getElementById('time-display').textContent = '0:' + (s < 10 ? '0' : '') + s;
    if (isPlaying && el < totalDuration) {
      animFrame = requestAnimationFrame(updateUI);
    } else if (el >= totalDuration) {
      isPlaying = false; elapsed = 0; pausedAt = 0;
      document.getElementById('playBtn').textContent = '▶';
      document.getElementById('progress').style.width = '0%';
      document.getElementById('time-display').textContent = '0:00';
    }
  }

  window.togglePlay = function() {
    if (!ctx) {
      ctx = new AudioCtx();
      gainNode = ctx.createGain();
      gainNode.gain.value = 0.7;
      gainNode.connect(ctx.destination);
    }
    if (ctx.state === 'suspended') ctx.resume();
    if (!isPlaying) {
      stopAll();
      startTime = ctx.currentTime;
      scheduleAll(pausedAt);
      isPlaying = true;
      document.getElementById('playBtn').textContent = '⏸';
      animFrame = requestAnimationFrame(updateUI);
      spawnNotes();
    } else {
      elapsed += ctx.currentTime - startTime;
      pausedAt = elapsed;
      stopAll();
      isPlaying = false;
      cancelAnimationFrame(animFrame);
      document.getElementById('playBtn').textContent = '▶';
    }
  };

  function spawnNotes() {
    if (!isPlaying) return;
    const scene = document.getElementById('scene');
    const symbols = ['♩','♪','♫','♬'];
    const el = document.createElement('span');
    el.className = 'note';
    el.textContent = symbols[Math.floor(Math.random() * symbols.length)];
    el.style.left = (20 + Math.random() * 60) + '%';
    el.style.bottom = '90px';
    el.style.color = ['#ec4899','#a855f7','#f472b6','#818cf8'][Math.floor(Math.random()*4)];
    el.style.animationDuration = (1.5 + Math.random()) + 's';
    scene.appendChild(el);
    setTimeout(() => el.remove(), 2500);
    if (isPlaying) setTimeout(spawnNotes, 600 + Math.random() * 400);
  }
})();
</script>

</body>
</html>
